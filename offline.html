<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ishwar Sahani | Offline</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Geist, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(59, 130, 246, 0.16), transparent 38%),
          linear-gradient(180deg, #020617 0%, #0f172a 100%);
        color: #e2e8f0;
      }

      main {
        width: min(92vw, 34rem);
        padding: 2rem;
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 1.5rem;
        background: rgba(15, 23, 42, 0.78);
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.35);
        backdrop-filter: blur(18px);
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(1.75rem, 4vw, 2.4rem);
        line-height: 1.1;
      }

      p {
        margin: 0 0 1rem;
        line-height: 1.6;
        color: rgba(226, 232, 240, 0.84);
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-top: 0.5rem;
        padding: 0.8rem 1rem;
        border-radius: 999px;
        background: #e2e8f0;
        color: #020617;
        font-weight: 600;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <p>Offline mode</p>
      <h1>You are offline right now.</h1>
      <p>
        The portfolio shell is cached, but this page needs a connection for the
        latest content. Reconnect and try again.
      </p>
      <a href="/">Retry portfolio</a>
    </main>
  </body>
</html>
